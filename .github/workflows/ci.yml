name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    if: false  # disabled 2026-06-21 — repo is private, local CI in ~/dev/armosphera/
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22.5']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install (acorn devDep for eval lanes)
        run: npm install --no-audit --no-fund --omit=optional

      - name: Run unit tests
        run: node --test 'test/*.test.js'
        shell: bash

  # ─── Karpathy eval lanes ────────────────────────────────────────────────
  # Each lane is an independent job so failures are isolated and the lane
  # name surfaces directly in the GitHub UI.
  di-contract-frozen:
    if: false  # disabled 2026-06-21 — repo is private, local CI in ~/dev/armosphera/
    name: "Karpathy eval: di-contract-frozen"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22.5
        uses: actions/setup-node@v4
        with:
          node-version: '22.5'

      - name: Install acorn (devDep for AST parser)
        run: npm install --no-audit --no-fund

      - name: Run di-contract-frozen lane
        run: node evals/di-contract-frozen/check.js

  fallback-models-stability:
    if: false  # disabled 2026-06-21 — repo is private, local CI in ~/dev/armosphera/
    name: "Karpathy eval: fallback-models-stability"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22.5
        uses: actions/setup-node@v4
        with:
          node-version: '22.5'

      - name: Install acorn (devDep for AST parser)
        run: npm install --no-audit --no-fund

      - name: Run fallback-models-stability lane
        run: node evals/fallback-models-stability/check.js
